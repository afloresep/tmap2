name: Build & Publish to PyPI

on:
  push:
    tags: ["v*"]
  workflow_dispatch:  # allow manual trigger for testing

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build sdist
        run: |
          pip install build
          python -m build --sdist

      - uses: actions/upload-artifact@v5
        with:
          name: sdist
          path: dist/*.tar.gz

  build-wheels:
    name: Wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
        # ubuntu-latest  = Linux x86_64
        # macos-14       = macOS arm64 (Apple Silicon)

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21
        env:
          # Build for Python 3.10 - 3.13
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-*"

          # Skip 32-bit and musl (Alpine) builds
          CIBW_SKIP: "*-win32 *-manylinux_i686 *-musllinux*"

          # Linux: install build tools inside the manylinux container
          CIBW_BEFORE_ALL_LINUX: >
            yum install -y cmake3 gcc-c++ make &&
            ln -sf /usr/bin/cmake3 /usr/bin/cmake || true

          # macOS: cmake is pre-installed on GitHub runners
          CIBW_BEFORE_ALL_MACOS: >
            brew install cmake || true

          # Verify the extension loaded after build
          CIBW_TEST_COMMAND: >
            python -c "from tmap.layout._ogdf import _AVAILABLE; assert _AVAILABLE, 'OGDF extension not available'"

          # macOS arm64 only on macos-14 runner
          CIBW_ARCHS_MACOS: "native"
          CIBW_ARCHS_LINUX: "x86_64"

      - uses: actions/upload-artifact@v5
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  publish:
    name: Publish to PyPI
    needs: [build-sdist, build-wheels]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write  # trusted publishing (no API token needed)

    steps:
      - uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
