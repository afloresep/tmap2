name: Tests

on:
  push:
    branches: [main, master, visualization]
  pull_request:
    branches: [main, master]

# Cancel in-progress runs when a new push is made
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast tests without OGDF (core functionality)
  pytest-core:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"

      - name: Run tests (without OGDF)
        run: python -m pytest -v --ignore=tests/test_layout_ogdf.py --ignore=tests/test_layout_from_lsh_forest.py --ignore=tests/test_end_to_end.py

  # Full tests with OGDF layout
  pytest-ogdf:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ make

      - name: Cache OGDF build
        id: cache-ogdf
        uses: actions/cache@v4
        with:
          path: /tmp/ogdf
          # Cache key includes workflow hash - any change to this file invalidates cache
          key: ogdf-fpic-${{ runner.os }}-${{ hashFiles('.github/workflows/tests.yml') }}

      - name: Clone and build OGDF
        if: steps.cache-ogdf.outputs.cache-hit != 'true'
        run: |
          cd /tmp
          git clone --depth 1 https://github.com/ogdf/ogdf.git
          cd ogdf
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_POSITION_INDEPENDENT_CODE=ON
          make -j$(nproc)

      - name: Install tmap with OGDF
        run: |
          python -m pip install --upgrade pip
          OGDF_DIR=/tmp/ogdf python -m pip install ".[dev]"

      - name: Verify OGDF extension
        run: |
          python -c "from tmap.layout import OGDF_AVAILABLE; print('OGDF:', OGDF_AVAILABLE); assert OGDF_AVAILABLE"

      - name: Run all tests
        run: python -m pytest -v

  # This job is required to pass for PRs to be mergeable
  # It depends on all other jobs succeeding
  all-tests-pass:
    name: All Tests Pass
    needs: [pytest-core, pytest-ogdf]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.pytest-core.result }}" != "success" ] || [ "${{ needs.pytest-ogdf.result }}" != "success" ]; then
            echo "❌ One or more test jobs failed"
            exit 1
          fi
          echo "✅ All tests passed successfully"
