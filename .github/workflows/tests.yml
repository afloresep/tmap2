name: Tests

on:
  push:
    branches: [main, master, visualization]
  pull_request:
    branches: [main, master]

# Cancel in-progress runs when a new push is made
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast tests without OGDF (core functionality)
  pytest-core:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --config-settings=cmake.define.TMAP_BUILD_LAYOUT=OFF ".[dev]"

      - name: Run tests (without OGDF)
        run: python -m pytest -v --ignore=tests/test_layout_ogdf.py --ignore=tests/test_layout_from_lsh_forest.py --ignore=tests/test_end_to_end.py

  # Full tests with OGDF layout
  pytest-ogdf:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ make

      - name: Verify bundled OGDF submodule
        run: |
          test -f extern/ogdf/CMakeLists.txt
          git submodule status

      - name: Install tmap with bundled OGDF
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"

      - name: Verify OGDF extension
        run: |
          python -c "from tmap.layout import OGDF_AVAILABLE; print('OGDF:', OGDF_AVAILABLE); assert OGDF_AVAILABLE"

      - name: Run all tests
        run: python -m pytest -v

  # This job is required to pass for PRs to be mergeable
  # It depends on all other jobs succeeding
  all-tests-pass:
    name: All Tests Pass
    needs: [pytest-core, pytest-ogdf]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.pytest-core.result }}" != "success" ] || [ "${{ needs.pytest-ogdf.result }}" != "success" ]; then
            echo "❌ One or more test jobs failed"
            exit 1
          fi
          echo "✅ All tests passed successfully"
